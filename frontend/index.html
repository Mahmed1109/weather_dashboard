<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
            transition: background 1s ease;
        }

        header {
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        header p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .unit-toggle {
            display: flex;
            gap: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .unit-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 50px;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .unit-btn.active {
            background: white;
            color: #1a1a2e;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .search-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .search-section h2 {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .search-section p {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            max-width: 500px;
            margin: 0 auto 20px;
        }

        .search-bar input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            backdrop-filter: blur(10px);
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-bar input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        .search-bar button {
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            background: #4a90d9;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }

        .search-bar button:hover {
            background: #357abd;
        }

        .recent-searches {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
            min-height: 30px;
        }

        .recent-tag {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 6px 16px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
            color: rgba(255, 255, 255, 0.8);
        }

        .recent-tag:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            display: none;
            margin-bottom: 30px;
        }

        .weather-card.active {
            display: block;
        }

        .weather-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .city-info h2 {
            font-size: 2.5rem;
            font-weight: 300;
        }

        .city-info p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .temp-info {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .temperature {
            font-size: 4rem;
            font-weight: 200;
            line-height: 1;
        }

        .description {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-top: 5px;
            text-transform: capitalize;
        }

        .weather-icon-emoji {
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 5px;
        }

        .weather-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.2s;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .stat-icon {
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin: 25px 0;
        }

        .forecast-section {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            display: none;
            margin-bottom: 30px;
        }

        .forecast-section.active {
            display: block;
        }

        .forecast-section h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 20px;
        }

        .forecast-days {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .forecast-day {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .forecast-day .day-name {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .forecast-day .day-emoji {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .forecast-day .day-temp {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .forecast-day .day-desc {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 5px;
            text-transform: capitalize;
        }

        .error-message {
            text-align: center;
            padding: 20px;
            color: #ff6b6b;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.5);
            display: none;
        }

        .loading.active {
            display: block;
        }
    </style>
</head>

<body>

    <header>
        <h1>⛅ Weather Dashboard</h1>
        <div class="unit-toggle">
            <button class="unit-btn active" id="btn-celsius" onclick="setUnits('metric')">°C</button>
            <button class="unit-btn" id="btn-fahrenheit" onclick="setUnits('imperial')">°F</button>
        </div>
    </header>

    <div class="container">

        <div class="search-section">
            <h2>How's the weather?</h2>
            <p>Search for any city in the world</p>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Enter a city name...">
                <button onclick="searchWeather()">Search</button>
            </div>
            <div class="recent-searches" id="recent-searches"></div>
        </div>

        <div class="loading" id="loading">Loading weather data...</div>
        <div class="error-message" id="error-message"></div>

        <div class="weather-card" id="weather-card">
            <div class="weather-main">
                <div class="city-info">
                    <h2 id="city-name">--</h2>
                    <p id="country-name">--</p>
                </div>
                <div class="temp-info">
                    <div class="weather-icon-emoji" id="weather-emoji">⛅</div>
                    <div class="temperature" id="temperature">--</div>
                    <div class="description" id="description">--</div>
                </div>
            </div>

            <hr class="divider">

            <div class="weather-stats">
                <div class="stat-item">
                    <div class="stat-icon">🌡️</div>
                    <div class="stat-value" id="feels-like">--</div>
                    <div class="stat-label">Feels Like</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">💧</div>
                    <div class="stat-value" id="humidity">--</div>
                    <div class="stat-label">Humidity</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">💨</div>
                    <div class="stat-value" id="wind-speed">--</div>
                    <div class="stat-label">Wind Speed</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">🔵</div>
                    <div class="stat-value" id="pressure">--</div>
                    <div class="stat-label">Pressure</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">👁️</div>
                    <div class="stat-value" id="visibility">--</div>
                    <div class="stat-label">Visibility</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">🌡️</div>
                    <div class="stat-value" id="temp-range">--</div>
                    <div class="stat-label">H / L</div>
                </div>
            </div>
        </div>

        <div class="forecast-section" id="forecast-section">
            <h3>5 Day Forecast</h3>
            <div class="forecast-days" id="forecast-days"></div>
        </div>

    </div>

    <script>
        const API = 'http://127.0.0.1:8000';
        let currentUnits = 'metric';
        let recentSearches = [];
        let lastSearchedCity = null;

        const weatherEmojis = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '⛅',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌦️', '10n': '🌧️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️'
        };

        const weatherBackgrounds = {
            'clear': 'linear-gradient(135deg, #f093fb 0%, #f5a623 50%, #f7b733 100%)',
            'clear-night': 'linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%)',
            'clouds': 'linear-gradient(135deg, #606c88 0%, #3f4c6b 100%)',
            'rain': 'linear-gradient(135deg, #373b44 0%, #4286f4 100%)',
            'drizzle': 'linear-gradient(135deg, #373b44 0%, #4286f4 100%)',
            'thunderstorm': 'linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #1a1a2e 100%)',
            'snow': 'linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%)',
            'mist': 'linear-gradient(135deg, #606c88 0%, #3f4c6b 100%)',
            'default': 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)'
        };

        function getBackground(description, icon) {
            const isNight = icon && icon.endsWith('n');
            const desc = description.toLowerCase();
            if (desc.includes('clear') && isNight) return weatherBackgrounds['clear-night'];
            if (desc.includes('clear')) return weatherBackgrounds['clear'];
            if (desc.includes('cloud')) return weatherBackgrounds['clouds'];
            if (desc.includes('rain')) return weatherBackgrounds['rain'];
            if (desc.includes('drizzle')) return weatherBackgrounds['drizzle'];
            if (desc.includes('thunder')) return weatherBackgrounds['thunderstorm'];
            if (desc.includes('snow')) return weatherBackgrounds['snow'];
            if (desc.includes('mist') || desc.includes('fog') || desc.includes('haze')) return weatherBackgrounds['mist'];
            return weatherBackgrounds['default'];
        }

        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        function getWeatherEmoji(icon) { return weatherEmojis[icon] || '🌡️'; }

        function setUnits(units) {
            currentUnits = units;
            document.getElementById('btn-celsius').classList.toggle('active', units === 'metric');
            document.getElementById('btn-fahrenheit').classList.toggle('active', units === 'imperial');
            if (lastSearchedCity) {
                document.getElementById('search-input').value = lastSearchedCity;
                searchWeather();
            }
        }

        function addRecentSearch(city) {
            recentSearches = recentSearches.filter(c => c.toLowerCase() !== city.toLowerCase());
            recentSearches.unshift(city);
            if (recentSearches.length > 5) recentSearches.pop();
            renderRecentSearches();
        }

        function renderRecentSearches() {
            const container = document.getElementById('recent-searches');
            if (recentSearches.length === 0) { container.innerHTML = ''; return; }
            container.innerHTML = recentSearches.map(city =>
                `<span class="recent-tag" onclick="quickSearch('${city}')">${city}</span>`
            ).join('');
        }

        function quickSearch(city) {
            document.getElementById('search-input').value = city;
            searchWeather();
        }

        function showLoading() {
            document.getElementById('loading').classList.add('active');
            document.getElementById('error-message').classList.remove('active');
            document.getElementById('weather-card').classList.remove('active');
            document.getElementById('forecast-section').classList.remove('active');
        }

        function showError(message) {
            document.getElementById('loading').classList.remove('active');
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-message').classList.add('active');
            document.getElementById('weather-card').classList.remove('active');
            document.getElementById('forecast-section').classList.remove('active');
        }

        function showWeather() {
            document.getElementById('loading').classList.remove('active');
            document.getElementById('error-message').classList.remove('active');
            document.getElementById('weather-card').classList.add('active');
        }

        function getUnitSymbol() { return currentUnits === 'metric' ? '°C' : '°F'; }
        function getWindUnit() { return currentUnits === 'metric' ? 'm/s' : 'mph'; }

        function displayWeather(data) {
            document.getElementById('city-name').textContent = data.city;
            document.getElementById('country-name').textContent = data.country;
            document.getElementById('temperature').textContent = `${Math.round(data.temperature)}${getUnitSymbol()}`;
            document.getElementById('description').textContent = data.description;
            document.getElementById('feels-like').textContent = `${Math.round(data.feels_like)}${getUnitSymbol()}`;
            document.getElementById('humidity').textContent = `${data.humidity}%`;
            document.getElementById('wind-speed').textContent = `${data.wind_speed} ${getWindUnit()}`;
            document.getElementById('pressure').textContent = `${data.pressure} hPa`;
            document.getElementById('visibility').textContent = `${(data.visibility / 1000).toFixed(1)} km`;
            document.getElementById('temp-range').textContent = `${Math.round(data.temp_max)}° / ${Math.round(data.temp_min)}°`;
            document.getElementById('weather-emoji').textContent = getWeatherEmoji(data.icon);
            document.body.style.background = getBackground(data.description, data.icon);
            showWeather();
        }

        function displayForecast(data) {
            const dailyMap = {};
            data.forecast.forEach(item => {
                if (!dailyMap[item.date]) dailyMap[item.date] = item;
            });

            const days = Object.values(dailyMap).slice(0, 5);
            const container = document.getElementById('forecast-days');

            container.innerHTML = days.map(day => {
                const date = new Date(day.date);
                const dayName = dayNames[date.getDay()];
                return `
                    <div class="forecast-day">
                        <div class="day-name">${dayName}</div>
                        <div class="day-emoji">${getWeatherEmoji(day.icon)}</div>
                        <div class="day-temp">${Math.round(day.temperature)}${getUnitSymbol()}</div>
                        <div class="day-desc">${day.description}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('forecast-section').classList.add('active');
        }

        async function searchWeather() {
            const city = document.getElementById('search-input').value.trim();
            if (!city) return;

            showLoading();

            try {
                const [weatherRes, forecastRes] = await Promise.all([
                    fetch(`${API}/weather/search?q=${encodeURIComponent(city)}&units=${currentUnits}`),
                    fetch(`${API}/weather/forecast/${encodeURIComponent(city)}?units=${currentUnits}`)
                ]);

                const weatherData = await weatherRes.json();
                const forecastData = await forecastRes.json();

                if (!weatherRes.ok) {
                    showError(weatherData.detail || 'Something went wrong');
                    return;
                }

                lastSearchedCity = weatherData.city;
                addRecentSearch(weatherData.city);
                displayWeather(weatherData);
                if (forecastRes.ok) displayForecast(forecastData);

            } catch (err) {
                showError('Could not connect to the server. Make sure the backend is running.');
            }
        }

        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchWeather();
        });
    </script>

</body>

</html>
