<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
            transition: background 1s ease;
        }

        header {
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        header p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .search-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .search-section h2 {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .search-section p {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }

        .search-bar input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            backdrop-filter: blur(10px);
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-bar input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        .search-bar button {
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            background: #4a90d9;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }

        .search-bar button:hover {
            background: #357abd;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            display: none;
            margin-bottom: 30px;
        }

        .weather-card.active {
            display: block;
        }

        .weather-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .city-info h2 {
            font-size: 2.5rem;
            font-weight: 300;
        }

        .city-info p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .temp-info {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .temperature {
            font-size: 4rem;
            font-weight: 200;
            line-height: 1;
        }

        .description {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-top: 5px;
            text-transform: capitalize;
        }

        .weather-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 5px;
        }

        .weather-icon-emoji {
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 5px;
        }

        .weather-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .error-message {
            text-align: center;
            padding: 20px;
            color: #ff6b6b;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.5);
            display: none;
        }

        .loading.active {
            display: block;
        }
    </style>
</head>

<body>

    <header>
        <h1>⛅ Weather Dashboard</h1>
        <p>Powered by OpenWeatherMap</p>
    </header>

    <div class="container">

        <div class="search-section">
            <h2>How's the weather?</h2>
            <p>Search for any city in the world</p>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Enter a city name...">
                <button onclick="searchWeather()">Search</button>
            </div>
        </div>

        <div class="loading" id="loading">Loading weather data...</div>
        <div class="error-message" id="error-message"></div>

        <div class="weather-card" id="weather-card">
            <div class="weather-main">
                <div class="city-info">
                    <h2 id="city-name">--</h2>
                    <p id="country-name">--</p>
                </div>
                <div class="temp-info">
                    <div class="weather-icon-emoji" id="weather-emoji">⛅</div>
                    <div class="temperature" id="temperature">--</div>
                    <div class="description" id="description">--</div>
                </div>
            </div>
            <div class="weather-stats">
                <div class="stat-item">
                    <div class="stat-value" id="feels-like">--</div>
                    <div class="stat-label">Feels Like</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="humidity">--</div>
                    <div class="stat-label">Humidity</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="wind-speed">--</div>
                    <div class="stat-label">Wind Speed</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="pressure">--</div>
                    <div class="stat-label">Pressure</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="visibility">--</div>
                    <div class="stat-label">Visibility</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="temp-range">--</div>
                    <div class="stat-label">H / L</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API = 'http://127.0.0.1:8000';
        let currentUnits = 'metric';

        const weatherEmojis = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '⛅',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌦️', '10n': '🌧️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️'
        };

        function getWeatherEmoji(icon) {
            return weatherEmojis[icon] || '🌡️';
        }

        function showLoading() {
            document.getElementById('loading').classList.add('active');
            document.getElementById('error-message').classList.remove('active');
            document.getElementById('weather-card').classList.remove('active');
        }

        function showError(message) {
            document.getElementById('loading').classList.remove('active');
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-message').classList.add('active');
            document.getElementById('weather-card').classList.remove('active');
        }

        function showWeather() {
            document.getElementById('loading').classList.remove('active');
            document.getElementById('error-message').classList.remove('active');
            document.getElementById('weather-card').classList.add('active');
        }

        function getUnitSymbol() { return currentUnits === 'metric' ? '°C' : '°F'; }
        function getWindUnit() { return currentUnits === 'metric' ? 'm/s' : 'mph'; }

        function displayWeather(data) {
            document.getElementById('city-name').textContent = data.city;
            document.getElementById('country-name').textContent = data.country;
            document.getElementById('temperature').textContent = `${Math.round(data.temperature)}${getUnitSymbol()}`;
            document.getElementById('description').textContent = data.description;
            document.getElementById('feels-like').textContent = `${Math.round(data.feels_like)}${getUnitSymbol()}`;
            document.getElementById('humidity').textContent = `${data.humidity}%`;
            document.getElementById('wind-speed').textContent = `${data.wind_speed} ${getWindUnit()}`;
            document.getElementById('pressure').textContent = `${data.pressure} hPa`;
            document.getElementById('visibility').textContent = `${(data.visibility / 1000).toFixed(1)} km`;
            document.getElementById('temp-range').textContent = `${Math.round(data.temp_max)}° / ${Math.round(data.temp_min)}°`;
            document.getElementById('weather-emoji').textContent = getWeatherEmoji(data.icon);
            showWeather();
        }

        async function searchWeather() {
            const city = document.getElementById('search-input').value.trim();
            if (!city) return;

            showLoading();

            try {
                const res = await fetch(`${API}/weather/search?q=${encodeURIComponent(city)}&units=${currentUnits}`);
                const data = await res.json();

                if (!res.ok) {
                    showError(data.detail || 'Something went wrong');
                    return;
                }

                displayWeather(data);
            } catch (err) {
                showError('Could not connect to the server. Make sure the backend is running.');
            }
        }

        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchWeather();
        });
    </script>

</body>

</html>
